networks:
  cloud-net:
    name: cloud-net #

services:
  # 1. Web Frontend - Server 1
  web-frontend-server:
    image: nginx:alpine # Alpine for low RAM
    container_name: web-frontend-server
    networks: [cloud-net]
    ports: ["8080:80"]
    volumes:
      - ./web-frontend-server/html:/usr/share/nginx/html:ro
      - ./web-frontend-server/conf.default:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 32M # Strict limit for static web
    restart: unless-stopped

  # 10. Load Balancing Expansion - Server 2
  web-frontend-server-2:
    image: nginx:alpine
    container_name: web-frontend-server-2
    networks: [cloud-net]
    volumes:
      - ./web-frontend-server/html:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          memory: 32M
    restart: unless-stopped

  # 2. Application Backend
  application-backend-server:
    build: ./application-backend-server #
    image: hotensv/app:dev
    container_name: application-backend-server
    networks: [cloud-net]
    ports: ["8085:8081"]
    environment:
      OIDC_ISSUER: "http://authentication-identity-server:8080/realms/master"
      OIDC_AUDIENCE: "myapp"
    deploy:
      resources:
        limits:
          memory: 96M # Flask is light 
    restart: unless-stopped

  # 3. Relational Database
  relational-database-server:
    image: mariadb:11-alpine # Alpine version
    container_name: relational-database-server
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - ./relational-database-server/init:/docker-entrypoint-initdb.d:ro #
    deploy:
      resources:
        limits:
          memory: 192M # Cap MariaDB to save host RAM
    networks: [cloud-net]

  # 4. Authentication Server
  authentication-identity-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: authentication-identity-server
    command: ["start-dev", "--http-relative-path", "/auth"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 450M # Keycloak needs at least this to start
    networks: [cloud-net]
    restart: unless-stopped

  # 5. Object Storage
  object-storage-server:
    image: minio/minio:8.0.0-alpine # Precise light version
    container_name: object-storage-server
    command: ["server","/data","--console-address",":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./object-storage-server/data:/data #
    deploy:
      resources:
        limits:
          memory: 128M #
    networks: [cloud-net]

  # 6. Internal DNS
  internal-dns-server:
    image: internetsystemsconsortium/bind9:9.18
    container_name: internal-dns-server
    ports: ["1053:53/udp"]
    volumes:
      - ./internal-dns-server/named.conf.options:/etc/bind/named.conf.options:ro
      - ./internal-dns-server/named.conf.local:/etc/bind/named.conf.local:ro
      - ./internal-dns-server/db.cloud.local:/etc/bind/db.cloud.local:ro #
    deploy:
      resources:
        limits:
          memory: 32M
    networks: [cloud-net]

  # 7. Monitoring (Prometheus)
  monitoring-prometheus-server:
    image: prom/prometheus:alpine
    container_name: monitoring-prometheus-server
    volumes:
      - ./monitoring-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro #
    deploy:
      resources:
        limits:
          memory: 128M #
    networks: [cloud-net]

  # 8. Visualization (Grafana)
  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: monitoring-grafana-dashboard-server
    ports: ["3000:3000"] #
    deploy:
      resources:
        limits:
          memory: 150M #
    networks: [cloud-net]

  # 9. Reverse Proxy / Gateway
  api-gateway-proxy-server:
    image: nginx:alpine
    container_name: api-gateway-proxy-server
    depends_on:
      - web-frontend-server
      - application-backend-server
    ports: ["80:80"] #
    volumes:
      - ./api-gateway-proxy-server/nginx.conf:/etc/nginx/nginx.conf:ro #
    deploy:
      resources:
        limits:
          memory: 32M
    networks: [cloud-net]
    restart: unless-stopped

  # Helper: Node Exporter
  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter-server
    networks: [cloud-net]
    deploy:
      resources:
        limits:
          memory: 20M
